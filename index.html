<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SBP Calc">
<title>SBP Slab Calculator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#fffcf8;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;color:#1a1714}
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
  input,textarea,button{font-family:inherit}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
  input:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px #d4b07a}
  button:active{transform:scale(0.97)}
  textarea{resize:none}
  ::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const STYLES = {
  SJ:  { label:"Super Jumbo", w:137,   h:79.5 },
  STD: { label:"Standard",   w:129,   h:65   },
  REG: { label:"Regular",    w:127,   h:64   },
};

const money  = n => "$" + n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const sqft   = n => n.toFixed(2) + " ft²";
const in2ft2 = (l,w) => (l*w)/144;
const today  = () => new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

/* ── colours ── */
const C = {
  gold:"#b8965a", goldLight:"#d4b07a", ink:"#1a1714", inkMid:"#4a4540",
  inkLight:"#8a8078", stone:"#f5f0eb", stoneMid:"#e8e0d5", card:"#ffffff",
};

/* ── shared styles ── */
const S = {
  sectionLabel:{ fontSize:11,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:C.inkLight,margin:"24px 0 10px" },
  card:{ background:C.card,borderRadius:20,border:`1px solid ${C.stoneMid}`,overflow:"hidden" },
  row:(last)=>({ display:"flex",alignItems:"center",padding:"14px 18px",borderBottom:last?"none":`1px solid ${C.stoneMid}`,gap:12 }),
  label:{ fontSize:15,color:C.ink,flex:1,fontWeight:400 },
  sub:{ display:"block",fontSize:11,color:C.inkLight,marginTop:2 },
  input:{ width:110,textAlign:"right",border:"none",background:C.stone,borderRadius:10,padding:"9px 12px",fontSize:15,fontWeight:500,color:C.ink },
  inputWide:{ flex:1,textAlign:"right",border:"none",background:C.stone,borderRadius:10,padding:"9px 12px",fontSize:15,fontWeight:500,color:C.ink,minWidth:0 },
  unit:{ fontSize:13,color:C.inkLight,minWidth:28,flexShrink:0 },
  matGrid:{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 },
  matCard:a=>({ border:`1.5px solid ${a?C.gold:C.stoneMid}`,background:a?"rgba(184,150,90,.08)":C.card,borderRadius:12,padding:"16px 14px",cursor:"pointer",textAlign:"left",width:"100%" }),
  matName:a=>({ fontSize:15,fontWeight:500,color:a?C.gold:C.ink }),
  styleGrid:{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8 },
  styleCard:a=>({ border:`1.5px solid ${a?C.gold:C.stoneMid}`,background:a?"rgba(184,150,90,.08)":C.card,borderRadius:12,padding:"12px 8px",cursor:"pointer",textAlign:"center",width:"100%" }),
  sCode:a=>({ fontSize:18,fontWeight:600,color:a?C.gold:C.ink }),
  infoBox:{ background:C.stone,borderRadius:12,padding:"11px 15px",fontSize:13,color:C.inkMid,marginTop:10 },
  feeChip:a=>({ flex:1,border:`1.5px solid ${a?C.gold:C.stoneMid}`,background:a?"rgba(184,150,90,.08)":C.card,borderRadius:12,padding:"11px 8px",fontSize:14,fontWeight:500,color:a?C.gold:C.inkLight,cursor:"pointer",textAlign:"center" }),
  btn:(bg,col)=>({ flex:1,border:"none",borderRadius:12,padding:15,fontSize:15,fontWeight:500,cursor:"pointer",background:bg,color:col }),
  btnSm:{ width:52,border:"none",borderRadius:12,padding:15,fontSize:18,fontWeight:500,cursor:"pointer",background:C.stoneMid,color:C.inkMid },
};

/* ── Toggle ── */
function Toggle({checked,onChange}){
  return(
    <div onClick={()=>onChange(!checked)} style={{width:50,height:28,borderRadius:100,flexShrink:0,cursor:"pointer",background:checked?C.gold:"#d3cec7",position:"relative",transition:"background .25s"}}>
      <div style={{position:"absolute",width:22,height:22,borderRadius:"50%",background:"white",top:3,left:checked?25:3,transition:"left .25s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
    </div>
  );
}

/* ── Toast ── */
function Toast({msg}){
  if(!msg)return null;
  return <div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:C.ink,color:"white",padding:"12px 22px",borderRadius:100,fontSize:14,fontWeight:500,zIndex:999,whiteSpace:"nowrap",pointerEvents:"none"}}>{msg}</div>;
}

/* ── Material picker ── */
function MatPicker({mat,setMat,style,setStyle}){
  return(
    <>
      <div style={S.sectionLabel}>Material type</div>
      <div style={S.matGrid}>
        {[["quartz","◈","Quartz","Engineered stone"],["natural","◇","Natural Stone","Marble, granite & more"]].map(([m,icon,name,sub])=>(
          <button key={m} style={S.matCard(mat===m)} onClick={()=>setMat(m)}>
            <div style={{fontSize:22,marginBottom:8}}>{icon}</div>
            <div style={S.matName(mat===m)}>{name}</div>
            <div style={{fontSize:12,color:C.inkLight,marginTop:2}}>{sub}</div>
          </button>
        ))}
      </div>
      {mat==="quartz"&&(
        <>
          <div style={S.sectionLabel}>Quartz style</div>
          <div style={S.styleGrid}>
            {Object.entries(STYLES).map(([k,v])=>(
              <button key={k} style={S.styleCard(style===k)} onClick={()=>setStyle(k)}>
                <div style={S.sCode(style===k)}>{k}</div>
                <div style={{fontSize:11,color:C.inkLight,marginTop:2}}>{v.label}</div>
                <div style={{fontSize:10,color:C.inkLight,marginTop:4,lineHeight:1.4}}>{v.w}" × {v.h}"</div>
              </button>
            ))}
          </div>
          <div style={S.infoBox}>Size locked to {STYLES[style].w}" × {STYLES[style].h}" ({STYLES[style].label})</div>
        </>
      )}
    </>
  );
}

/* ── Natural dims ── */
function NaturalDims({length,setLength,width,setWidth}){
  return(
    <>
      <div style={S.sectionLabel}>Slab dimensions</div>
      <div style={S.card}>
        <div style={S.row(false)}>
          <div style={S.label}>Length<small style={S.sub}>Per slab, inches</small></div>
          <input style={S.input} type="number" inputMode="decimal" placeholder="0" value={length} onChange={e=>setLength(e.target.value)}/>
          <span style={S.unit}>in</span>
        </div>
        <div style={S.row(true)}>
          <div style={S.label}>Width<small style={S.sub}>Per slab, inches</small></div>
          <input style={S.input} type="number" inputMode="decimal" placeholder="0" value={width} onChange={e=>setWidth(e.target.value)}/>
          <span style={S.unit}>in</span>
        </div>
      </div>
    </>
  );
}

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App(){
  const [tab,setTab]   = useState("quote");
  const [toast,setToast] = useState("");

  /* shared */
  const [clientName,setClientName] = useState("");
  const [quoteDate,setQuoteDate]   = useState(today());

  /* quote */
  const [qMat,setQMat]         = useState("quartz");
  const [qStyle,setQStyle]     = useState("SJ");
  const [qLength,setQLength]   = useState("");
  const [qWidth,setQWidth]     = useState("");
  const [qColor,setQColor]     = useState("");
  const [qPpsf,setQPpsf]       = useState("");
  const [qQty,setQQty]         = useState("1");
  const [qTax,setQTax]         = useState(false);
  const [qDelivery,setQDelivery] = useState(false);
  const [qDelFee,setQDelFee]   = useState(50);
  const [qTxn,setQTxn]         = useState(false);
  const [qNotes,setQNotes]     = useState("");

  /* reverse */
  const [rMat,setRMat]         = useState("quartz");
  const [rStyle,setRStyle]     = useState("SJ");
  const [rLength,setRLength]   = useState("");
  const [rWidth,setRWidth]     = useState("");
  const [rPrice,setRPrice]     = useState("");
  const [rTaxInc,setRTaxInc]   = useState(false);

  /* history */
  const [history,setHistory] = useState(()=>{
    try{return JSON.parse(localStorage.getItem("sbpH")||"[]")}catch{return[]}
  });

  /* net final */
  const [netItems,setNetItems] = useState(()=>{
    try{return JSON.parse(localStorage.getItem("sbpNF")||"[]")}catch{return[]}
  });
  const [netTax,setNetTax] = useState(false);

  const showToast = msg=>{setToast(msg);setTimeout(()=>setToast(""),2300)};

  /* dims helpers */
  const qDims = ()=> qMat==="quartz"?{l:STYLES[qStyle].w,h:STYLES[qStyle].h}:{l:parseFloat(qLength)||0,h:parseFloat(qWidth)||0};
  const rDims = ()=> rMat==="quartz"?{l:STYLES[rStyle].w,h:STYLES[rStyle].h}:{l:parseFloat(rLength)||0,h:parseFloat(rWidth)||0};

  /* quote calc */
  const qC = (()=>{
    const {l,h}=qDims();
    const ppsf=parseFloat(qPpsf)||0, qty=parseInt(qQty)||1;
    if(!l||!h||!ppsf)return null;
    const areaSlab=in2ft2(l,h), areaTotal=areaSlab*qty;
    const preTax=areaTotal*ppsf;
    const taxAmt=qTax?preTax*0.08:0, withTax=preTax+taxAmt;
    const delAmt=qDelivery?qDelFee*qty:0, withDel=withTax+delAmt;
    const txnAmt=qTxn?withDel*0.02:0, grand=withDel+txnAmt;
    return{areaSlab,areaTotal,preTax,taxAmt,withTax,delAmt,withDel,txnAmt,grand};
  })();

  /* reverse calc */
  const rC = (()=>{
    const {l,h}=rDims();
    const ps=parseFloat(rPrice)||0;
    if(!l||!h||!ps)return null;
    const area=in2ft2(l,h);
    const base=rTaxInc?ps/1.08:ps;
    const taxRemoved=rTaxInc?ps-base:0;
    return{area,base,taxRemoved,ppsf:base/area};
  })();

  /* net final calcs */
  const netSub   = netItems.reduce((s,i)=>s+in2ft2(i.l,i.h)*i.qty*i.ppsf,0);
  const netTaxAmt= netTax?netSub*0.08:0;
  const netTotal = netSub+netTaxAmt;

  /* actions */
  const addToNet = ()=>{
    const {l,h}=qDims();
    if(!qColor.trim()){showToast("Enter a color name first");return}
    if(!l||!h||!qPpsf){showToast("Fill dimensions and price first");return}
    const dimLabel=qMat==="quartz"?`${STYLES[qStyle].w}"×${STYLES[qStyle].h}" (${qStyle})`:`${l}"×${h}"`;
    const entry={id:Date.now(),color:qColor.trim(),dimLabel,l,h,qty:parseInt(qQty)||1,ppsf:parseFloat(qPpsf)};
    const upd=[...netItems,entry];
    setNetItems(upd);localStorage.setItem("sbpNF",JSON.stringify(upd));
    showToast(`"${qColor.trim()}" added ✓`);
  };

  const removeNetItem = id=>{
    const upd=netItems.filter(i=>i.id!==id);
    setNetItems(upd);localStorage.setItem("sbpNF",JSON.stringify(upd));
  };

  const clearNet = ()=>{setNetItems([]);localStorage.setItem("sbpNF","[]");showToast("Cleared")};

  const saveQuote = ()=>{
    const {l,h}=qDims();
    if(!l||!h||!qPpsf||!qC){showToast("Fill in all fields first");return}
    const entry={
      id:Date.now(),
      label:qMat==="quartz"?`Quartz ${qStyle}`:"Natural Stone",
      l,h,qty:qQty||1,ppsf:qPpsf,
      client:clientName,notes:qNotes,
      grand:Math.round(qC.grand).toLocaleString("en-US"),
      date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
    };
    const upd=[entry,...history];
    setHistory(upd);localStorage.setItem("sbpH",JSON.stringify(upd));
    showToast("Saved ✓");
  };

  const clearHistory = ()=>{setHistory([]);localStorage.setItem("sbpH","[]");showToast("Cleared")};

  const copyQuote = ()=>{
    if(!qC){showToast("Nothing to copy yet");return}
    const {l,h}=qDims();
    const mat=qMat==="quartz"?`Quartz ${qStyle} (${l}"×${h}")`:`Natural Stone (${l}"×${h}")`;
    const lines=["Slab Quote","──────────────────────",
      clientName?`Client: ${clientName}`:"",`Date: ${quoteDate}`,
      `Color: ${qColor||"—"}`,`Material: ${mat}`,
      `Qty: ${qQty||1} slab(s)`,`Price/sqft: $${qPpsf}`,"",
      `Price before tax:   ${money(qC.preTax)}`
    ].filter(Boolean);
    if(qTax){lines.push(`Tax (8%):           ${money(qC.taxAmt)}`);lines.push(`Price with tax:     ${money(qC.withTax)}`)}
    if(qDelivery){lines.push(`Delivery:           ${money(qC.delAmt)}`);lines.push(`With delivery:      ${money(qC.withDel)}`)}
    if(qTxn)lines.push(`Transaction (2%):   ${money(qC.txnAmt)}`);
    lines.push("",`GRAND TOTAL:        $${Math.round(qC.grand).toLocaleString("en-US")}`);
    if(qNotes)lines.push("",`Notes: ${qNotes}`);
    navigator.clipboard.writeText(lines.join("\n")).then(()=>showToast("Copied ✓")).catch(()=>showToast("Copy not supported"));
  };

  const resetQuote = ()=>{
    setQColor("");setQLength("");setQWidth("");setQPpsf("");setQQty("1");
    setQTax(false);setQDelivery(false);setQTxn(false);setQNotes("");
    showToast("Cleared");
  };

  const emailNet = ()=>{
    if(!netItems.length){showToast("No items to send");return}
    const client=clientName.trim()||"Client";
    const subject=`Sales Order — ${client} — ${quoteDate||today()}`;
    const lines=[
      `Client: ${client}`,`Date: ${quoteDate||today()}`,``,
      `SALES ORDER`,`─────────────────────────────────────`,
    ];
    netItems.forEach((item,i)=>{
      const area=in2ft2(item.l,item.h)*item.qty;
      lines.push(``,`${i+1}. ${item.color}`,
        `   Dimensions : ${item.dimLabel}`,
        `   Quantity   : ${item.qty} slab${item.qty>1?"s":""}`,
        `   Price/ft²  : $${item.ppsf.toFixed(2)}`,
        `   Line total : ${money(area*item.ppsf)}`);
    });
    lines.push(``,`─────────────────────────────────────`,
      `Subtotal (before tax) : ${money(netSub)}`);
    if(netTax)lines.push(`Tax (8%)              : ${money(netTaxAmt)}`);
    lines.push(`TOTAL                 : ${money(netTotal)}`,``,
      `─────────────────────────────────────`,`Sent from SBP Slab Calculator`);
    window.location.href=`mailto:Abhi@pacsurfaces.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(lines.join("\n"))}`;
    showToast("Opening Mail…");
  };

  /* quote result rows */
  const qRows = qC?[
    {label:"Area per slab",        value:sqft(qC.areaSlab),  show:true},
    {label:"Total area",           value:sqft(qC.areaTotal), show:true},
    {label:"Price before tax",     value:money(qC.preTax),   show:true},
    {label:"Tax (8%)",             value:money(qC.taxAmt),   show:qTax},
    {label:"Price with tax",       value:money(qC.withTax),  show:qTax},
    {label:"Delivery fees",        value:money(qC.delAmt),   show:qDelivery},
    {label:"Price with delivery",  value:money(qC.withDel),  show:qDelivery},
    {label:"Transaction fee (2%)", value:money(qC.txnAmt),   show:qTxn},
  ].filter(r=>r.show):[];

  const TABS=["quote","reverse","history","netfinal"];
  const LABELS={quote:"Quote",reverse:"Reverse",history:"History",netfinal:"Net Final"};

  return(
    <div style={{background:"#fffcf8",minHeight:"100vh"}}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 20px 80px"}}>

        {/* ── Header ── */}
        <div style={{padding:"52px 0 24px",display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:C.inkLight,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Stone &amp; Quartz</div>
            <div style={{fontSize:32,fontWeight:400,lineHeight:1.1,fontFamily:"Georgia,serif"}}>Calculator</div>
          </div>
          <div style={{width:44,height:44,background:C.gold,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 3l4-4 4 4-4 4-4-4z"/></svg>
          </div>
        </div>

        {/* ── Tabs ── */}
        <div style={{display:"flex",background:C.stoneMid,borderRadius:100,padding:3,marginBottom:28}}>
          {TABS.map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{
              flex:1,border:"none",fontSize:13,fontWeight:500,padding:"10px 2px",
              borderRadius:100,cursor:"pointer",transition:"all .2s",
              background:tab===t?"white":"transparent",
              color:tab===t?C.ink:C.inkLight,
              boxShadow:tab===t?"0 1px 4px rgba(0,0,0,.1)":"none"
            }}>{LABELS[t]}</button>
          ))}
        </div>

        {/* ════════ QUOTE ════════ */}
        {tab==="quote"&&(
          <div>
            {/* Client & Date */}
            <div style={S.sectionLabel}>Client &amp; date</div>
            <div style={S.card}>
              <div style={S.row(false)}>
                <div style={S.label}>Client name<small style={S.sub}>Appears on Net Final &amp; email</small></div>
                <input style={S.inputWide} type="text" placeholder="e.g. John Smith" value={clientName} onChange={e=>setClientName(e.target.value)}/>
              </div>
              <div style={S.row(true)}>
                <div style={S.label}>Quote date</div>
                <input style={S.inputWide} type="text" placeholder={today()} value={quoteDate} onChange={e=>setQuoteDate(e.target.value)}/>
              </div>
            </div>

            <MatPicker mat={qMat} setMat={setQMat} style={qStyle} setStyle={setQStyle}/>
            {qMat==="natural"&&<NaturalDims length={qLength} setLength={setQLength} width={qWidth} setWidth={setQWidth}/>}

            {/* Color */}
            <div style={S.sectionLabel}>Color name</div>
            <div style={S.card}>
              <div style={S.row(true)}>
                <div style={S.label}>Color / product name<small style={S.sub}>Required for Net Final</small></div>
                <input style={S.inputWide} type="text" placeholder="e.g. Calacatta Gold" value={qColor} onChange={e=>setQColor(e.target.value)}/>
              </div>
            </div>

            {/* Pricing */}
            <div style={S.sectionLabel}>Pricing</div>
            <div style={S.card}>
              <div style={S.row(false)}>
                <div style={S.label}>Price per sqft<small style={S.sub}>Before tax</small></div>
                <span style={{...S.unit,minWidth:0,marginRight:-4,color:C.gold}}>$</span>
                <input style={S.input} type="number" inputMode="decimal" placeholder="0.00" value={qPpsf} onChange={e=>setQPpsf(e.target.value)}/>
                <span style={S.unit}>/ ft²</span>
              </div>
              <div style={S.row(true)}>
                <div style={S.label}>Quantity</div>
                <input style={S.input} type="number" inputMode="numeric" placeholder="1" value={qQty} onChange={e=>setQQty(e.target.value)}/>
                <span style={S.unit}>slabs</span>
              </div>
            </div>

            {/* Extras */}
            <div style={S.sectionLabel}>Extras &amp; fees</div>
            <div style={S.card}>
              <div style={S.row(false)}>
                <div style={S.label}>Tax applicable<small style={S.sub}>8% sales tax</small></div>
                <Toggle checked={qTax} onChange={setQTax}/>
              </div>
              <div style={{...S.row(!qDelivery),flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",width:"100%",gap:12}}>
                  <div style={S.label}>Delivery fee<small style={S.sub}>Per slab</small></div>
                  <Toggle checked={qDelivery} onChange={setQDelivery}/>
                </div>
                {qDelivery&&(
                  <div style={{width:"100%",paddingTop:10,display:"flex",gap:8}}>
                    <button style={S.feeChip(qDelFee===50)} onClick={()=>setQDelFee(50)}>$50 / slab</button>
                    <button style={S.feeChip(qDelFee===75)} onClick={()=>setQDelFee(75)}>$75 / slab</button>
                  </div>
                )}
              </div>
              <div style={S.row(true)}>
                <div style={S.label}>Online payment<small style={S.sub}>2% transaction fee</small></div>
                <Toggle checked={qTxn} onChange={setQTxn}/>
              </div>
            </div>

            {/* Result */}
            {qC&&(
              <div style={{background:C.ink,borderRadius:20,overflow:"hidden",marginTop:28}}>
                <div style={{padding:"24px 22px 16px"}}>
                  <div style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,.4)",marginBottom:6}}>Grand Total</div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:44,color:"white",lineHeight:1}}>
                    <span style={{fontFamily:"sans-serif",fontSize:22,fontWeight:300,verticalAlign:"top",marginTop:5,display:"inline-block",color:C.goldLight}}>$</span>
                    {Math.round(qC.grand).toLocaleString("en-US")}
                  </div>
                </div>
                <div style={{padding:"0 22px 20px"}}>
                  {qRows.map((r,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",padding:"13px 0",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
                      <span style={{flex:1,fontSize:14,color:"rgba(255,255,255,.55)"}}>{r.label}</span>
                      <span style={{fontSize:15,fontWeight:500,color:"white"}}>{r.value}</span>
                    </div>
                  ))}
                  <div style={{display:"flex",alignItems:"center",padding:"13px 0"}}>
                    <span style={{flex:1,fontSize:14,fontWeight:500,color:"white"}}>Grand total</span>
                    <span style={{fontSize:17,fontWeight:600,color:"white"}}>{money(qC.grand)}</span>
                  </div>
                </div>
              </div>
            )}

            <div style={S.sectionLabel}>Notes</div>
            <textarea style={{width:"100%",background:C.card,border:`1px solid ${C.stoneMid}`,borderRadius:20,padding:"16px 18px",fontSize:15,color:C.ink,minHeight:76}} placeholder="Project details, special instructions…" rows={3} value={qNotes} onChange={e=>setQNotes(e.target.value)}/>

            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button style={S.btnSm} onClick={resetQuote}>↺</button>
              <button style={S.btn(C.stoneMid,C.ink)} onClick={copyQuote}>Copy</button>
              <button style={S.btn(C.stoneMid,C.ink)} onClick={saveQuote}>Save</button>
            </div>
            <button onClick={addToNet} style={{width:"100%",marginTop:10,border:`1.5px solid ${C.gold}`,borderRadius:12,padding:15,fontSize:15,fontWeight:500,cursor:"pointer",background:"transparent",color:C.gold}}>
              + Add to Net Final
            </button>
          </div>
        )}

        {/* ════════ REVERSE ════════ */}
        {tab==="reverse"&&(
          <div>
            <MatPicker mat={rMat} setMat={setRMat} style={rStyle} setStyle={setRStyle}/>
            {rMat==="natural"&&<NaturalDims length={rLength} setLength={setRLength} width={rWidth} setWidth={setRWidth}/>}

            <div style={S.sectionLabel}>Known price</div>
            <div style={S.card}>
              <div style={S.row(false)}>
                <div style={S.label}>Price per slab<small style={S.sub}>What you know / paid</small></div>
                <span style={{...S.unit,minWidth:0,marginRight:-4,color:C.gold}}>$</span>
                <input style={S.input} type="number" inputMode="decimal" placeholder="0.00" value={rPrice} onChange={e=>setRPrice(e.target.value)}/>
              </div>
              <div style={S.row(true)}>
                <div style={S.label}>Price includes tax?<small style={S.sub}>8% will be backed out</small></div>
                <Toggle checked={rTaxInc} onChange={setRTaxInc}/>
              </div>
            </div>

            {rC&&(
              <div style={{background:C.card,border:`1px solid ${C.stoneMid}`,borderRadius:20,overflow:"hidden",marginTop:28}}>
                <div style={{background:C.gold,padding:"20px 22px"}}>
                  <div style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,.7)",marginBottom:4}}>Price per sqft</div>
                  <div style={{fontFamily:"Georgia,serif",fontSize:38,color:"white"}}>${rC.ppsf.toFixed(2)}</div>
                  <div style={{fontSize:13,color:"rgba(255,255,255,.8)",marginTop:4}}>
                    {rMat==="quartz"?`Quartz ${rStyle} — ${STYLES[rStyle].w}"×${STYLES[rStyle].h}"`:`Natural Stone — ${rLength}"×${rWidth}"`}
                  </div>
                </div>
                <div style={{padding:"0 18px"}}>
                  <div style={{display:"flex",padding:"13px 0",borderBottom:`1px solid ${C.stoneMid}`}}><span style={{flex:1,fontSize:14,color:C.inkLight}}>Slab area</span><span style={{fontSize:15,fontWeight:500,color:C.ink}}>{sqft(rC.area)}</span></div>
                  {rTaxInc&&<div style={{display:"flex",padding:"13px 0",borderBottom:`1px solid ${C.stoneMid}`}}><span style={{flex:1,fontSize:14,color:C.inkLight}}>Tax removed (8%)</span><span style={{fontSize:15,fontWeight:500,color:C.ink}}>{money(rC.taxRemoved)}</span></div>}
                  <div style={{display:"flex",padding:"13px 0",borderBottom:`1px solid ${C.stoneMid}`}}><span style={{flex:1,fontSize:14,color:C.inkLight}}>Base price (excl. tax)</span><span style={{fontSize:15,fontWeight:500,color:C.ink}}>{money(rC.base)}</span></div>
                  <div style={{display:"flex",padding:"13px 0"}}><span style={{flex:1,fontSize:14,color:C.inkLight}}>Price per sqft</span><span style={{fontSize:15,fontWeight:500,color:C.ink}}>{money(rC.ppsf)} / ft²</span></div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ════════ HISTORY ════════ */}
        {tab==="history"&&(
          <div>
            <div style={S.card}>
              {history.length===0?(
                <div style={{padding:"32px 18px",textAlign:"center",color:C.inkLight,fontSize:14,lineHeight:1.7}}>No saved quotes yet.<br/>Calculate and tap "Save."</div>
              ):history.map((h,i)=>(
                <div key={h.id} style={{display:"flex",alignItems:"center",padding:"14px 18px",borderBottom:i===history.length-1?"none":`1px solid ${C.stoneMid}`,gap:14}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:C.gold,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:500,color:C.ink}}>{h.client?`${h.client} — `:""}{h.label} · {h.qty} slab{h.qty>1?"s":""}</div>
                    <div style={{fontSize:12,color:C.inkLight,marginTop:2}}>{h.date}{h.notes?" · "+h.notes.slice(0,28):""}</div>
                  </div>
                  <div style={{fontSize:15,fontWeight:600,color:C.gold}}>${h.grand}</div>
                </div>
              ))}
            </div>
            {history.length>0&&(
              <button onClick={clearHistory} style={{...S.btn(C.stoneMid,C.inkMid),width:"100%",marginTop:14}}>Clear all history</button>
            )}
          </div>
        )}

        {/* ════════ NET FINAL ════════ */}
        {tab==="netfinal"&&(
          <div>
            {/* Client header */}
            <div style={{background:C.ink,borderRadius:16,padding:"18px 20px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,.4)",marginBottom:4}}>Client</div>
                <div style={{fontSize:18,fontWeight:500,color:"white"}}>
                  {clientName.trim()||<span style={{color:"rgba(255,255,255,.3)",fontStyle:"italic",fontWeight:400}}>No client set</span>}
                </div>
                <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:3}}>{quoteDate}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(255,255,255,.4)",marginBottom:6}}>Tax (8%)</div>
                <Toggle checked={netTax} onChange={setNetTax}/>
              </div>
            </div>

            {/* Items */}
            {netItems.length===0?(
              <div style={{...S.card,padding:"32px 18px",textAlign:"center",color:C.inkLight,fontSize:14,lineHeight:1.8}}>
                No items yet.<br/>Go to Quote, fill in a color name<br/>and tap "+ Add to Net Final".
              </div>
            ):(
              <div style={S.card}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 88px 34px 66px 26px",gap:6,padding:"10px 14px",borderBottom:`1px solid ${C.stoneMid}`,background:C.stone}}>
                  {["Color","Dimensions","Qty","$/ft²",""].map((h,i)=>(
                    <div key={i} style={{fontSize:10,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:C.inkLight,textAlign:i>=2?"center":"left"}}>{h}</div>
                  ))}
                </div>
                {netItems.map((item,idx)=>{
                  const area=in2ft2(item.l,item.h)*item.qty;
                  const lineTotal=area*item.ppsf;
                  return(
                    <div key={item.id} style={{display:"grid",gridTemplateColumns:"1fr 88px 34px 66px 26px",gap:6,padding:"12px 14px",alignItems:"center",borderBottom:idx===netItems.length-1?"none":`1px solid ${C.stoneMid}`}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:500,color:C.ink}}>{item.color}</div>
                        <div style={{fontSize:11,color:C.inkLight,marginTop:2}}>{money(lineTotal)}</div>
                      </div>
                      <div style={{fontSize:11,color:C.inkMid,lineHeight:1.4}}>{item.dimLabel}</div>
                      <div style={{fontSize:13,color:C.inkMid,textAlign:"center"}}>{item.qty}</div>
                      <div style={{fontSize:13,color:C.inkMid,textAlign:"center"}}>${item.ppsf.toFixed(2)}</div>
                      <button onClick={()=>removeNetItem(item.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.inkLight,padding:0,textAlign:"center"}}>×</button>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Totals */}
            {netItems.length>0&&(
              <>
                <div style={{background:C.ink,borderRadius:20,overflow:"hidden",marginTop:16}}>
                  <div style={{padding:"20px 22px"}}>
                    <div style={{display:"flex",padding:"13px 0",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
                      <span style={{flex:1,fontSize:14,color:"rgba(255,255,255,.55)"}}>Subtotal (before tax)</span>
                      <span style={{fontSize:15,fontWeight:500,color:"white"}}>{money(netSub)}</span>
                    </div>
                    {netTax&&(
                      <div style={{display:"flex",padding:"13px 0",borderBottom:"1px solid rgba(255,255,255,.08)"}}>
                        <span style={{flex:1,fontSize:14,color:"rgba(255,255,255,.55)"}}>Tax (8%)</span>
                        <span style={{fontSize:15,fontWeight:500,color:"white"}}>{money(netTaxAmt)}</span>
                      </div>
                    )}
                    <div style={{display:"flex",padding:"13px 0"}}>
                      <span style={{flex:1,fontSize:15,fontWeight:500,color:"white"}}>Total</span>
                      <span style={{fontSize:18,fontWeight:600,color:"white"}}>{money(netTotal)}</span>
                    </div>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,marginTop:16}}>
                  <button onClick={clearNet} style={S.btn(C.stoneMid,C.inkMid)}>Clear all</button>
                  <button onClick={emailNet} style={S.btn(C.gold,"white")}>✉ Send quote</button>
                </div>
              </>
            )}
          </div>
        )}

      </div>
      <Toast msg={toast}/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
